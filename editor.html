<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二點五維度關卡開發暨管理系統 | e 化開發者工作室</title>
    <style>
        :root {
            --roc-blue: #003366;
            --roc-red: #cc0000;
            --roc-yellow: #ffff00;
            --roc-cyan: #00ffff;
            --roc-gold: #ffcc00;
            --bg-dark: #0f151d;
            --bg-panel: linear-gradient(to bottom, hsl(210 100% 18%), hsl(210 100% 12%));
            --accent: #ffff00;
            --accent-glow: rgba(255, 255, 0, 0.4);
            --text: #ffffff;
            --border: #c0c0c0;
            --card-bg: #111822;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'PMingLiU', 'MingLiU', 'DFKai-SB', "Microsoft JhengHei", Tahoma, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* 驗證前隱藏編輯器組件 */
        #toolbar, #sidebar, #main-view { display: flex !important; }
        .auth-unlocked #toolbar, .auth-unlocked #sidebar, .auth-unlocked #main-view { display: flex !important; }
        .auth-unlocked #main-view { display: block !important; }

        /* --- 密碼鎖門已禁用 --- */
        #login-gate { display: none !important; }

        #login-box {
            background: var(--bg-panel);
            padding: 40px;
            border-radius: 0;
            border: 4px ridge var(--border);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 350px;
        }

        #login-box h2 {
            margin: 0 0 20px;
            color: var(--roc-yellow);
            letter-spacing: 2px;
            font-size: 20px;
            font-family: 'DFKai-SB', serif;
            border-bottom: 3px double var(--roc-yellow);
            padding-bottom: 10px;
        }

        #pass-input {
            width: 100%;
            padding: 12px;
            background: #001122;
            border: 2px solid var(--border);
            color: #fff;
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            outline: none;
        }

        #login-btn {
            width: 100%;
            padding: 12px;
            background: var(--roc-yellow);
            border: 3px outset #ffffff;
            color: #000033;
            font-weight: bold;
            font-family: 'PMingLiU', serif;
            cursor: pointer;
        }

        .error-msg { color: #ff4444; font-size: 14px; margin-top: 10px; opacity: 0; font-weight: bold; }

        /* --- 佈局 --- */
        #toolbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 65px;
            background: linear-gradient(to bottom, #003366, #001122);
            border-bottom: 4px ridge var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            justify-content: space-between;
            box-shadow: 0 3px 5px rgba(0,0,0,0.8);
        }

        #sidebar {
            width: 350px !important;
            min-width: 350px !important;
            max-width: 350px !important;
            background: linear-gradient(to bottom, hsl(210 50% 15%), hsl(210 50% 10%));
            border-right: 4px ridge var(--border);
            margin-top: 65px;
            display: flex !important;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            z-index: 50;
            box-shadow: 3px 0 5px rgba(0,0,0,0.5);
        }

        #main-view {
            flex-grow: 1;
            margin-top: 65px;
            position: relative;
            background-color: #080f14;
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.1) 1px, transparent 0);
            background-size: 50px 50px;
        }

        canvas { display: block; }

        /* --- UI 元件 - 老 Windows XP 浮雕按鈕 --- */
        .btn {
            background: linear-gradient(to bottom, #e0e0e0, #888888);
            border: 3px outset #ffffff;
            color: #000033;
            padding: 8px 15px;
            border-radius: 0;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            font-family: 'PMingLiU', 'MingLiU', serif;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 2px 2px 3px rgba(0,0,0,0.8);
        }

        .btn:hover { background: linear-gradient(to bottom, #ffffff, #aaaaaa); color: #000000; }
        .btn:active { border-style: inset; box-shadow: 1px 1px 1px rgba(0,0,0,0.8); transform: translate(1px, 1px); }

        .btn.primary {
            background: linear-gradient(to bottom, #ffffcc, #cccc00);
            border: 3px outset #ffffff;
            color: #333300;
        }
        .btn.primary:hover { background: linear-gradient(to bottom, #ffffff, #eeee00); }

        .btn.btn-gold {
            background: linear-gradient(to bottom, #ffcc00, #996600);
            border: 3px outset #ffff66;
            color: #331100;
        }
        .btn.btn-gold:hover { background: linear-gradient(to bottom, #ffff33, #bb8800); }

        .tool-btn {
            background: linear-gradient(to bottom, #335577, #112233);
            border: 3px outset #6688aa;
            color: var(--text);
            padding: 10px 5px;
            border-radius: 0;
            cursor: pointer;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            font-family: 'PMingLiU', serif;
            font-weight: bold;
            box-shadow: 2px 2px 3px rgba(0,0,0,0.8);
        }

        .tool-btn:hover { background: linear-gradient(to bottom, #446688, #223344); }
        .tool-btn.active {
            background: linear-gradient(to bottom, #cccc00, #888800);
            border: 3px inset #ffff00;
            color: #000000;
            box-shadow: none;
        }

        .panel-section {
            margin-bottom: 25px;
            background: rgba(0,0,0,0.3);
            border: 2px solid #446688;
            padding: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        .panel-section h3 {
            font-size: 16px;
            font-family: 'DFKai-SB', serif;
            color: var(--roc-yellow);
            margin: 0 0 15px 0;
            border-bottom: 2px solid var(--roc-yellow);
            padding-bottom: 5px;
            text-shadow: 1px 1px 1px #000;
        }

        .prop-row { display: flex; align-items: center; margin-bottom: 12px; gap: 10px; }
        .prop-label { width: 105px; font-size: 14px; font-weight: bold; color: var(--roc-yellow); font-family: 'PMingLiU', serif; }
        .prop-input {
            flex-grow: 1;
            background: #001122;
            border: 2px inset var(--border);
            color: #fff;
            padding: 6px 10px;
            border-radius: 0;
            font-size: 14px;
            font-family: Tahoma, sans-serif;
            width: 100%;
        }
        .prop-input:focus { outline: none; border-color: var(--roc-yellow); background: #002244; }

        #layer-list { list-style: none; padding: 0; margin: 0; }
        .layer-item {
            padding: 8px 12px;
            background: linear-gradient(to bottom, #224466, #112233);
            border: 2px outset #446688;
            margin-bottom: 6px;
            font-size: 14px;
            font-family: 'PMingLiU', serif;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 2px 2px 3px rgba(0,0,0,0.5);
        }
        .layer-item:hover { background: linear-gradient(to bottom, #336699, #113355); }
        .layer-item.selected { background: linear-gradient(to bottom, #cccc00, #888800); border: 2px inset #ffff00; color: #000; font-weight: bold; }

        #view-overlay {
            position: fixed; bottom: 20px; right: 20px;
            padding: 10px 20px;
            background: linear-gradient(to bottom, #003366, #001122);
            border: 3px ridge var(--border);
            font-size: 15px; font-weight: bold; font-family: 'PMingLiU', serif;
            color: var(--roc-yellow);
            pointer-events: none; z-index: 1000; box-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        .color-preview { width: 20px; height: 20px; border: 2px solid #fff; }
        #login-gate.hidden { opacity: 0; visibility: hidden; }
    </style>
    <script>
        function unlock() {
            document.addEventListener('DOMContentLoaded', () => {
                document.body.classList.add('auth-unlocked');
                const gate = document.getElementById('login-gate');
                if (gate) gate.classList.add('hidden');
            });
        }
        function tryLogin() {}
        unlock();
    </script>
</head>
<body>
    <div id="login-gate">
        <div id="login-box">
            <h2>【管理登錄窗口】</h2>
            <input type="password" id="pass-input" placeholder="Enter Password">
            <button id="login-btn">憑證核驗 (VERIFY)</button>
            <div class="error-msg">INVALID ACCESS KEY</div>
        </div>
    </div>

<div id="toolbar">
    <div style="display: flex; gap: 15px; align-items: center;">
        <div style="font-weight: 900; font-size: 20px; color: var(--roc-yellow); font-family: 'DFKai-SB', serif; text-shadow: 2px 2px 2px #000; border-bottom: 2px solid var(--roc-yellow); padding-bottom: 2px;">◆ 開發者工作室</div>
        <div style="width: 2px; height: 35px; background: var(--border); border-right: 1px solid #000;"></div>
        <button class="btn" onclick="newLevel()">【新建】e 化地圖專案</button>
        <button class="btn" onclick="exportJSON()">【導出】表單與附件匯出</button>
        <button class="btn" onclick="importJSON()">【導入】外部數據登錄</button>
        <button class="btn btn-gold" onclick="copyLevelCode()">【複製】密碼憑證字串</button>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn" id="view-toggle" onclick="toggleEditorView()">【監控視角】上帝平面視角</button>
        <button class="btn primary" onclick="testLevel()">會員身分驗證登錄暨 e 化實機檢測窗口</button>
    </div>
</div>

<div id="sidebar">
    <div class="panel-section">
        <h3>【操作模式切換專區】</h3>
        <div style="display: flex; gap: 8px;">
            <button class="tool-btn active" id="tool-place" onclick="setTool('place')">
                <span>➕</span>放置作業
            </button>
            <button class="tool-btn" id="tool-drag" onclick="setTool('drag')">
                <span>🖐️</span>拖曳微調
            </button>
            <button class="tool-btn" id="tool-edit" onclick="setTool('edit')">
                <span>📐</span>規格檢驗
            </button>
        </div>
    </div>

    <div class="panel-section">
        <h3>【畫布基礎規格設定】</h3>
        <div class="prop-row">
            <span class="prop-label">畫布寬度 (W)</span>
            <input type="number" id="world-w" class="prop-input" value="800" oninput="updateWorld()">
        </div>
        <div class="prop-row">
            <span class="prop-label">畫布深度 (D)</span>
            <input type="number" id="world-h" class="prop-input" value="600" oninput="updateWorld()">
        </div>
        <div class="prop-row">
            <span class="prop-label">網格對齊 (Grid)</span>
            <input type="number" id="grid-size" class="prop-input" value="25" oninput="draw()">
        </div>
    </div>

    <div class="panel-section">
        <h3>【已選取物件屬性登錄】</h3>
        <div id="no-selection-msg" style="color: rgba(255,255,255,0.3); font-size: 13px; font-style: italic;">尚未選取任何物件</div>
        <div id="selected-props" style="display: none;">
            <div class="prop-row">
                <span class="prop-label">類型</span>
                <select id="obj-type" class="prop-input" onchange="updateSelected()">
                    <option value="obstacle">一般障礙 (Obstacle)</option>
                    <option value="lava">岩漿地帶 (Lava)</option>
                </select>
            </div>
            <div class="prop-row">
                <span class="prop-label">座標 X</span>
                <input type="number" id="obj-x" class="prop-input" oninput="updateSelected()">
            </div>
            <div class="prop-row">
                <span class="prop-label">座標 Y (深)</span>
                <input type="number" id="obj-y" class="prop-input" oninput="updateSelected()">
            </div>
            <div class="prop-row">
                <span class="prop-label">寬度 (W)</span>
                <input type="number" id="obj-w" class="prop-input" oninput="updateSelected()">
            </div>
            <div class="prop-row">
                <span class="prop-label">深度 (D)</span>
                <input type="number" id="obj-d" class="prop-input" oninput="updateSelected()">
            </div>
            <div class="prop-row">
                <span class="prop-label">高度 (H)</span>
                <input type="number" id="obj-h" class="prop-input" oninput="updateSelected()">
            </div>
            <div class="prop-row">
                <span class="prop-label">離地高度 (Z)</span>
                <input type="number" id="obj-z" class="prop-input" oninput="updateSelected()">
            </div>
            <div class="prop-row" id="color-row">
                <span class="prop-label">顏色</span>
                <input type="color" id="obj-color" class="prop-input" oninput="updateSelected()" style="height: 35px; padding: 2px;">
            </div>
            <div class="prop-row" id="require-x-row">
                <span class="prop-label">需按 X 下降</span>
                <input type="checkbox" id="obj-require-x" onchange="updateSelected()" style="width: 20px; height: 20px; cursor: pointer;">
            </div>
            <button class="btn" style="width: 100%; margin-top: 15px; color: #ff5555; border-color: rgba(255,85,85,0.3);" onclick="deleteSelected()">刪除物件</button>
        </div>
    </div>

    <div class="panel-section" style="flex-grow: 1;">
        <h3>物件清單</h3>
        <ul id="layer-list"></ul>
    </div>
</div>

<div id="main-view">
    <canvas id="editorCanvas"></canvas>
    <div id="view-overlay">
        左鍵：操作 | 右鍵：平移 | 滾輪：縮放 | 側面模式：支援直覺拉伸
    </div>
</div>

<script>
    const canvas = document.getElementById('editorCanvas');
    const ctx = canvas.getContext('2d');
    
    let world = { x: 50, y: 50, width: 800, height: 600 };
    let obstacles = [];
    let selectedIndex = -1;
    
    let viewMode = 'topdown'; 
    let activeTool = 'drag'; 
    
    let camera = { x: 0, y: 0, zoom: 1 };
    let isPanning = false;
    let isCreating = false;
    let isDragging = false;
    let isResizing = false;
    let lastMouse = { x: 0, y: 0 };
    let dragOffset = { x: 0, y: 0 };
    let createStart = { x: 0, y: 0 };
    let resizeCorner = -1; // 0:TL, 1:TR, 2:BL, 3:BR

    let undoStack = [];
    let redoStack = [];
    const MAX_HISTORY = 50;
    let renderRequested = false;

    function requestRender() {
        if (!renderRequested) {
            renderRequested = true;
            requestAnimationFrame(() => {
                draw();
                renderRequested = false;
            });
        }
    }

    function saveState() {
        const state = JSON.stringify({
            obstacles: obstacles,
            selectedIndex: selectedIndex
        });
        if (undoStack.length > 0 && undoStack[undoStack.length - 1] === state) return;
        undoStack.push(state);
        if (undoStack.length > MAX_HISTORY) undoStack.shift();
        redoStack = []; 
    }

    function undo() {
        if (undoStack.length === 0) return;
        const currentState = JSON.stringify({
            obstacles: obstacles,
            selectedIndex: selectedIndex
        });
        redoStack.push(currentState);
        
        const state = JSON.parse(undoStack.pop());
        obstacles = state.obstacles;
        selectedIndex = state.selectedIndex;
        requestRender();
    }

    function redo() {
        if (redoStack.length === 0) return;
        const currentState = JSON.stringify({
            obstacles: obstacles,
            selectedIndex: selectedIndex
        });
        undoStack.push(currentState);
        
        const state = JSON.parse(redoStack.pop());
        obstacles = state.obstacles;
        selectedIndex = state.selectedIndex;
        requestRender();
    }

    window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && (e.key === 'z' || e.key === 'Z')) {
            e.preventDefault();
            undo();
        }
        if (e.ctrlKey && (e.key === 'y' || e.key === 'Y' || (e.shiftKey && (e.key === 'z' || e.key === 'Z')))) {
            e.preventDefault();
            redo();
        }
        // 刪除物件
        if (e.key === 'Delete' || e.key === 'Backspace') {
            if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'SELECT') {
                deleteSelected();
            }
        }
    });

    
    function resizeCanvas() {
        const mv = document.getElementById('main-view');
        if (!mv) return;
        canvas.width = mv.clientWidth;
        canvas.height = mv.clientHeight;
        requestRender();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function getProjectedRect(obs, mode) {
        if (mode === 'topdown') {
            return { x: obs.x, y: obs.y, w: obs.baseWidth, h: obs.baseDepth };
        } else {
            // 側面圖投影：Screen X 對應 World Y，Screen Y 對應 World Z
            return {
                x: world.x + (obs.y - world.y),
                y: world.y + world.height - (obs.baseZ || 0) - obs.baseHeight,
                w: obs.baseDepth,
                h: obs.baseHeight
            };
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(canvas.width / 2 + camera.x, canvas.height / 2 + camera.y);
        ctx.scale(camera.zoom, camera.zoom);
        
        const grid = parseInt(document.getElementById('grid-size').value) || 25;
        if (grid >= 5) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1/camera.zoom;
            ctx.beginPath();
            for (let x = -2000; x <= 2000; x += grid) {
                ctx.moveTo(x, -2000); ctx.lineTo(x, 2000);
            }
            for (let y = -2000; y <= 2000; y += grid) {
                ctx.moveTo(-2000, y); ctx.lineTo(2000, y);
            }
            ctx.stroke();
        }

        ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
        const curW = (viewMode === 'topdown' ? world.width : world.height);
        ctx.fillRect(world.x, world.y, curW, world.height);
        ctx.strokeStyle = '#00ffcc';
        ctx.strokeRect(world.x, world.y, curW, world.height);
        
        obstacles.forEach((obs, index) => {
            const r = getProjectedRect(obs, viewMode);
            ctx.save();
            ctx.fillStyle = (obs.type === 'lava') ? '#ff3300' : (obs.color || '#777');
            ctx.globalAlpha = (selectedIndex === index) ? 1.0 : (viewMode === 'sideview' ? 0.5 : 0.7);
            ctx.fillRect(r.x, r.y, r.w, r.h);
            if (selectedIndex === index && activeTool === 'edit') {
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3 / camera.zoom;
                ctx.strokeRect(r.x, r.y, r.w, r.h);
                // 繪製四個角的小方塊
                ctx.fillStyle = '#fff';
                const sz = 14 / camera.zoom;
                ctx.fillRect(r.x - sz/2, r.y - sz/2, sz, sz); // TL
                ctx.fillRect(r.x + r.w - sz/2, r.y - sz/2, sz, sz); // TR
                ctx.fillRect(r.x - sz/2, r.y + r.h - sz/2, sz, sz); // BL
                ctx.fillRect(r.x + r.w - sz/2, r.y + r.h - sz/2, sz, sz); // BR
            }
            ctx.restore();
        });

        if (isCreating && viewMode === 'topdown') {
            ctx.fillStyle = 'rgba(0, 255, 204, 0.3)';
            const cur = snap(screenToWorld(lastMouse.x, lastMouse.y));
            const x = Math.min(createStart.x, cur.x);
            const y = Math.min(createStart.y, cur.y);
            const w = Math.abs(createStart.x - cur.x);
            const d = Math.abs(createStart.y - cur.y);
            ctx.fillRect(x, y, w, d);
        }

        ctx.restore();
    }

    function screenToWorld(sx, sy) {
        const r = canvas.getBoundingClientRect();
        return {
            x: (sx - r.left - canvas.width / 2 - camera.x) / camera.zoom,
            y: (sy - r.top - canvas.height / 2 - camera.y) / camera.zoom
        };
    }

    function snap(pos) {
        const grid = parseInt(document.getElementById('grid-size').value) || 1;
        return { x: Math.round(pos.x / grid) * grid, y: Math.round(pos.y / grid) * grid };
    }

    function setTool(tool) {
        activeTool = tool;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        if (document.getElementById('tool-' + tool)) document.getElementById('tool-' + tool).classList.add('active');
        isCreating = isDragging = isResizing = false;
        requestRender();
    }

    canvas.onmousedown = (e) => {
        lastMouse = { x: e.clientX, y: e.clientY };
        const wPos = screenToWorld(e.clientX, e.clientY);
        if (e.button === 2) { isPanning = true; return; }

        saveState();

        if (activeTool === 'place' && viewMode === 'topdown') {
            isCreating = true; createStart = snap(wPos); selectedIndex = -1; requestRender(); return;
        }

        if (activeTool === 'edit' && selectedIndex !== -1) {
            const r = getProjectedRect(obstacles[selectedIndex], viewMode);
            const sz = 14 / camera.zoom;
            const corners = [
                {x: r.x, y: r.y},           // 0: TL
                {x: r.x + r.w, y: r.y},     // 1: TR
                {x: r.x, y: r.y + r.h},     // 2: BL
                {x: r.x + r.w, y: r.y + r.h} // 3: BR
            ];
            for (let i = 0; i < 4; i++) {
                if (wPos.x >= corners[i].x - sz && wPos.x <= corners[i].x + sz &&
                    wPos.y >= corners[i].y - sz && wPos.y <= corners[i].y + sz) {
                    isResizing = true;
                    resizeCorner = i;
                    return;
                }
            }
        }

        if (activeTool === 'drag' || activeTool === 'edit') {
            let found = -1;
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const r = getProjectedRect(obstacles[i], viewMode);
                if (wPos.x >= r.x && wPos.x <= r.x + r.w && wPos.y >= r.y && wPos.y <= r.y + r.h) {
                    found = i; break;
                }
            }
            selectedIndex = found;
            if (selectedIndex !== -1) {
                isDragging = true;
                const r = getProjectedRect(obstacles[selectedIndex], viewMode);
                dragOffset = { x: wPos.x - r.x, y: wPos.y - r.y };
            }
        }
        requestRender();
        updateUI();
    };

    canvas.onmousemove = (e) => {
        const dx = e.clientX - lastMouse.x;
        const dy = e.clientY - lastMouse.y;
        lastMouse = { x: e.clientX, y: e.clientY };
        const wPos = screenToWorld(e.clientX, e.clientY);

        if (isPanning) { camera.x += dx; camera.y += dy; }
        else if (isResizing && selectedIndex !== -1) {
            const obs = obstacles[selectedIndex];
            const s = snap(wPos);
            if (viewMode === 'topdown') {
                const oldX = obs.x, oldY = obs.y, oldW = obs.baseWidth, oldD = obs.baseDepth;
                if (resizeCorner === 3) { // BR
                    obs.baseWidth = Math.max(10, s.x - obs.x);
                    obs.baseDepth = Math.max(10, s.y - obs.y);
                } else if (resizeCorner === 0) { // TL
                    const newX = Math.min(s.x, oldX + oldW - 10);
                    const newY = Math.min(s.y, oldY + oldD - 10);
                    obs.baseWidth = oldX + oldW - newX;
                    obs.baseDepth = oldY + oldD - newY;
                    obs.x = newX; obs.y = newY;
                } else if (resizeCorner === 1) { // TR
                    obs.baseWidth = Math.max(10, s.x - obs.x);
                    const newY = Math.min(s.y, oldY + oldD - 10);
                    obs.baseDepth = oldY + oldD - newY;
                    obs.y = newY;
                } else if (resizeCorner === 2) { // BL
                    const newX = Math.min(s.x, oldX + oldW - 10);
                    obs.baseWidth = oldX + oldW - newX;
                    obs.x = newX;
                    obs.baseDepth = Math.max(10, s.y - obs.y);
                }
            } else {
                const H_floor = world.y + world.height;
                const oldY = obs.y, oldD = obs.baseDepth;
                const oldZ = obs.baseZ || 0, oldH = obs.baseHeight;
                const Z_top = oldZ + oldH, Y_right = oldY + oldD;
                const curWY = s.x - world.x + world.y, curWZ = H_floor - s.y;

                if (resizeCorner === 3) { // BR (其實是 Y_right 和 Z)
                    obs.baseDepth = Math.max(10, curWY - oldY);
                    const newZ = Math.min(curWZ, Z_top - 10);
                    obs.baseZ = newZ; obs.baseHeight = Z_top - newZ;
                } else if (resizeCorner === 0) { // TL (對應 Y 和 Z_top)
                    const newY = Math.min(curWY, Y_right - 10);
                    obs.y = newY; obs.baseDepth = Y_right - newY;
                    obs.baseHeight = Math.max(10, curWZ - oldZ);
                } else if (resizeCorner === 1) { // TR (對應 Y_right 和 Z_top)
                    obs.baseDepth = Math.max(10, curWY - oldY);
                    obs.baseHeight = Math.max(10, curWZ - oldZ);
                } else if (resizeCorner === 2) { // BL (對應 Y 和 Z)
                    const newY = Math.min(curWY, Y_right - 10);
                    obs.y = newY; obs.baseDepth = Y_right - newY;
                    const newZ = Math.min(curWZ, Z_top - 10);
                    obs.baseZ = newZ; obs.baseHeight = Z_top - newZ;
                }
            }
        } else if (isDragging && selectedIndex !== -1) {
            const obs = obstacles[selectedIndex];
            const s = snap({ x: wPos.x - dragOffset.x, y: wPos.y - dragOffset.y });
            if (viewMode === 'topdown') { obs.x = s.x; obs.y = s.y; }
            else {
                // 側面圖平移：X -> World Y, Y -> World Z
                obs.y = world.y + (s.x - world.x);
                obs.baseZ = (world.y + world.height) - s.y - obs.baseHeight;
                // 對齊網格
                const grid = parseInt(document.getElementById('grid-size').value) || 1;
                obs.baseZ = Math.round(obs.baseZ / grid) * grid;
            }
        }
        
        if (isDragging || isResizing || isPanning) requestRender();
    };

    window.onmouseup = () => {
        if (isCreating && viewMode === 'topdown') {
            const cur = snap(screenToWorld(lastMouse.x, lastMouse.y));
            const x = Math.min(createStart.x, cur.x);
            const y = Math.min(createStart.y, cur.y);
            const w = Math.max(10, Math.abs(createStart.x - cur.x));
            const d = Math.max(10, Math.abs(createStart.y - cur.y));
            obstacles.push({ x, y, baseWidth: w, baseDepth: d, baseHeight: 120, color: '#777777', type: 'obstacle' });
            selectedIndex = obstacles.length - 1;
        }
        isPanning = isDragging = isCreating = isResizing = false;
        updateUI();
        requestRender();
    };

    canvas.onwheel = (e) => { e.preventDefault(); camera.zoom *= (e.deltaY > 0 ? 0.9 : 1.1); requestRender(); };
    canvas.oncontextmenu = (e) => e.preventDefault();

    function toggleEditorView() {
        viewMode = (viewMode === 'topdown' ? 'sideview' : 'topdown');
        document.getElementById('view-toggle').innerText = `【監控視角】${viewMode === 'topdown' ? '上帝平面視角' : '側面切片預覽'}`;
        updateUI();
        requestRender();
    }

    function updateUI() {
        updatePropertyPanel();
        updateLayerList();
    }

    function updatePropertyPanel() {
        const props = document.getElementById('selected-props');
        const msg = document.getElementById('no-selection-msg');
        if (selectedIndex === -1) { props.style.display = 'none'; msg.style.display = 'block'; }
        else {
            props.style.display = 'block'; msg.style.display = 'none';
            const obs = obstacles[selectedIndex];
            if (document.activeElement.className !== 'prop-input') {
                document.getElementById('obj-type').value = obs.type || 'obstacle';
                document.getElementById('obj-x').value = Math.round(obs.x);
                document.getElementById('obj-y').value = Math.round(obs.y);
                document.getElementById('obj-w').value = Math.round(obs.baseWidth);
                document.getElementById('obj-d').value = Math.round(obs.baseDepth);
                document.getElementById('obj-h').value = Math.round(obs.baseHeight || 120);
                document.getElementById('obj-z').value = Math.round(obs.baseZ || 0);
                document.getElementById('obj-color').value = obs.color || '#777777';
                document.getElementById('obj-require-x').checked = !!obs.requireX;

                document.getElementById('color-row').style.display = (obs.type === 'obstacle' ? 'flex' : 'none');
                document.getElementById('require-x-row').style.display = (obs.type === 'obstacle' ? 'flex' : 'none');
            }
        }
    }

    function updateLayerList() {
        const list = document.getElementById('layer-list');
        list.innerHTML = '';
        obstacles.forEach((obs, i) => {
            const li = document.createElement('li');
            li.className = 'layer-item' + (selectedIndex === i ? ' selected' : '');
            const emoji = obs.type === 'lava' ? '🔥' : '📦';
            li.innerHTML = `<span>${emoji} ${obs.type === 'lava' ? '岩漿地帶' : '標準障礙物'} #${i}</span>`;
            li.onclick = () => { selectedIndex = i; draw(); };
            list.appendChild(li);
        });
    }

    function updateSelected() {
        if (selectedIndex === -1) return;
        const obs = obstacles[selectedIndex];
        obs.type = document.getElementById('obj-type').value;
        
        obs.x = parseFloat(document.getElementById('obj-x').value);
        obs.y = parseFloat(document.getElementById('obj-y').value);
        obs.baseWidth = parseFloat(document.getElementById('obj-w').value);
        obs.baseDepth = parseFloat(document.getElementById('obj-d').value);
        obs.baseHeight = parseFloat(document.getElementById('obj-h').value);
        obs.baseZ = parseFloat(document.getElementById('obj-z').value) || 0;
        obs.color = document.getElementById('obj-color').value;
        obs.requireX = document.getElementById('obj-require-x').checked;
        updateUI();
    }

    function deleteSelected() { if (selectedIndex !== -1) { saveState(); obstacles.splice(selectedIndex, 1); selectedIndex = -1; updateUI(); draw(); } }
    function newLevel() { if (confirm("【系統確認】是否確定清空當前專案資料並啟動新建作業？")) { saveState(); obstacles = []; selectedIndex = -1; draw(); } }
    function exportJSON() {
        const str = JSON.stringify({ world, obstacles }, null, 2);
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([str], {type: "application/json"}));
        a.download = "level.json"; a.click();
    }
    function importJSON() {
        const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
        input.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (re) => {
                saveState();
                const data = JSON.parse(re.target.result);
                world = data.world; obstacles = data.obstacles;
                draw();
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }
    function copyLevelCode() {
        const data = JSON.stringify({ world, obstacles });
        const code = btoa(unescape(encodeURIComponent(data)));
        navigator.clipboard.writeText(code).then(() => {
            alert("【系統通知】關卡密碼憑證字串已成功複製至剪貼簿！請妥善保管並於遊戲主程式登錄。");
        }).catch(err => {
            prompt("【系統通知】請手動複製以下關卡密碼憑證字串：", code);
        });
    }
    function testLevel() {
        const levelData = JSON.stringify({ world, obstacles });
        localStorage.setItem('customLevelData', levelData);
        window.open('GAME.html?custom=true', '_blank');
    }

    function updateWorld() {
        world.width = parseInt(document.getElementById('world-w').value) || 800;
        world.height = parseInt(document.getElementById('world-h').value) || 600;
        updateUI();
        draw();
    }
    function centerCamera() {
        camera.x = -(world.x + world.width / 2);
        camera.y = -(world.y + world.height / 2);
        draw();
    }

    setTool('drag');
    updateUI();
    centerCamera();

    // 自動為所有屬性框加上 focus 時儲存狀態，以便復原
    document.querySelectorAll('.prop-input').forEach(input => {
        input.addEventListener('focus', () => saveState());
    });
</script>
</body>
</html>
