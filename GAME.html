<html lang="zh-TW">

<head>
    <meta charset="UTF-8">

    <meta name="description" content="一款獨特的 2.5D 視角切換冒險遊戲。在上帝視角與側面視角之間切換，破解空間謎題，挑戰維度邊界。">
    <meta name="keywords" content="2.5D, Game, Perspective Shift, Web Game, HTML5, JavaScript, 空間解謎, 獨立遊戲">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌀</text></svg>">
    <style>
        :root {
            --roc-blue: #003366;
            --roc-red: #cc0000;
            --roc-yellow: #ffff00;
            --roc-cyan: #00ffff;
            --roc-gold: #ffcc00;
            --bg: #0f151d;
            --text: #ffffff;
            --panel-bg: rgba(15, 21, 29, 0.9);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'PMingLiU', 'MingLiU', 'DFKai-SB', "Microsoft JhengHei", Tahoma, Arial, sans-serif;
            color: var(--text);
        }

        canvas {
            display: block;
            margin-top: 30px; /* 留給跑馬燈空間 */
        }

        /* 視角狀態提示 - 行政資訊帶風格 */
        #view-info {
            position: fixed;
            top: 45px;
            left: 20px;
            padding: 8px 15px;
            background: linear-gradient(to bottom, hsl(210 100% 25%), hsl(210 100% 20%));
            color: var(--roc-yellow);
            border: 3px ridge #c0c0c0;
            font-family: 'PMingLiU', 'MingLiU', serif;
            font-size: 15px;
            font-weight: bold;
            z-index: 5;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        /* 遊戲開始畫面 - 舊式入口網站/政令宣導頁風格 */
        #start-screen {
            position: fixed;
            top: 30px;
            left: 0;
            width: 100%;
            height: calc(100% - 30px);
            background: linear-gradient(to bottom, #002244 0%, #001122 100%);
            border: 8px ridge #c0c0c0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            box-sizing: border-box;
            transition: opacity 0.5s;
        }

        /* 早期 Word 文字藝術師感標題 */
        #game-title {
            font-size: clamp(50px, 12vw, 110px);
            font-family: 'DFKai-SB', 'PMingLiU', serif;
            font-weight: 900;
            color: var(--roc-yellow);
            transform: skew(-10deg) scaleY(1.2);
            text-shadow: 3px 3px 0 #000, 6px 6px 0 var(--roc-red), 9px 9px 0 #000, 12px 12px 20px rgba(255,255,0,0.8);
            margin: 0 0 20px 0;
            letter-spacing: 0.1em;
            border-bottom: 5px double var(--roc-yellow);
            padding-bottom: 10px;
        }

        #game-subtitle {
            background: var(--roc-red);
            color: var(--roc-yellow);
            font-family: 'PMingLiU', serif;
            font-size: 18px;
            font-weight: bold;
            padding: 8px 25px;
            border: 3px outset #ff6666;
            margin-bottom: 40px;
            letter-spacing: 3px;
            box-shadow: 3px 3px 0 #000;
        }

        /* 老 Windows XP 浮雕亮面按鈕 */
        .roc-btn {
            margin-top: 15px;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            font-family: 'PMingLiU', 'MingLiU', 'DFKai-SB', serif;
            border-radius: 0;
            cursor: pointer;
            box-shadow: 3px 3px 5px rgba(0,0,0,0.8);
            transition: all 0.1s;
        }

        .roc-btn:active {
            box-shadow: 1px 1px 1px rgba(0,0,0,0.8);
            transform: translate(2px, 2px);
        }

        #start-btn {
            background: linear-gradient(to bottom, #00ffff, #008888);
            border: 4px outset #ccffff;
            color: #000033;
            font-size: 24px;
            padding: 15px 50px;
        }

        #start-btn:hover {
            background: linear-gradient(to bottom, #ccffff, #00aaaa);
        }

        .btn-yellow {
            background: linear-gradient(to bottom, #ffffcc, #cccc00);
            border: 4px outset #ffffff;
            color: #333300;
        }
        .btn-yellow:hover { background: linear-gradient(to bottom, #ffffff, #eeee00); }

        .btn-blue {
            background: linear-gradient(to bottom, #6699cc, #003366);
            border: 4px outset #aaccff;
            color: #ffffff;
        }
        .btn-blue:hover { background: linear-gradient(to bottom, #99ccff, #004488); }

        .btn-gold {
            background: linear-gradient(to bottom, #ffcc00, #996600);
            border: 4px outset #ffff66;
            color: #331100;
        }
        .btn-gold:hover { background: linear-gradient(to bottom, #ffff33, #bb8800); }

        /* RPG 對話框 - 華國美學公文框 */
        #dialog-overlay {
            position: fixed;
            top: 30px;
            left: 0;
            width: 100%;
            height: calc(100% - 30px);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 40px;
            z-index: 10;
            background: rgba(0, 0, 20, 0.6);
        }

        #dialog-box {
            width: 90%;
            max-width: 850px;
            background: linear-gradient(to bottom, hsl(210 100% 15%), hsl(210 100% 10%));
            border: 6px ridge #c0c0c0;
            padding: 25px 30px;
            color: #ffffff;
            font-family: 'DFKai-SB', 'PMingLiU', serif;
            font-size: 22px;
            line-height: 1.6;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.9);
        }

        #dialog-footer {
            text-align: right;
            font-size: 16px;
            color: var(--roc-yellow);
            margin-top: 20px;
            font-family: 'PMingLiU', serif;
            font-weight: bold;
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .hidden { display: none !important; }

        /* 嘗試操作階段的樣式 */
        #dialog-overlay.trying-action { background: rgba(0, 0, 0, 0); }
        #dialog-overlay.trying-action #dialog-box {
            background: linear-gradient(to bottom, rgba(0,34,68,0.4), rgba(0,17,34,0.4));
            border-color: rgba(192,192,192,0.4);
        }
        #dialog-overlay.trying-action #dialog-content { opacity: 0.25; }
        #dialog-overlay.trying-action #dialog-footer {
            opacity: 1;
            color: var(--roc-yellow);
            text-shadow: 2px 2px 2px #000;
        }
    </style>
</head>

<body>

    <!-- 政令宣導跑馬燈 -->
    <div id="roc-banner" style="position: fixed; top: 0; left: 0; width: 100%; background: linear-gradient(to bottom, #003366, #001122); color: #ffff00; font-family: 'PMingLiU', 'MingLiU', 'DFKai-SB', serif; font-size: 16px; font-weight: bold; padding: 5px 0; border-bottom: 3px ridge #c0c0c0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.8);">
        <marquee scrollamount="5">【行政院暨國家二點五維度遊戲開發推動委員會 e 化便民宣導】歡迎各位鄉親民眾蒞臨本系統！請務必詳閱相關操作規範，落實空間切換便民措施，共創多維度美好未來！如有任何問題請洽詢本系統服務窗口。</marquee>
    </div>

    <div id="view-info">【本系統當前監控狀態】 ＞ 上帝平面視角模式 (※ 按 E 鍵切換 e 化視圖)</div>

    <div id="start-screen">
        <h1 id="game-title">2.5D 跨維度</h1>
        <div id="game-subtitle">◆ 中華民國二點五維度空間轉換虛擬實境暨 e 化便民遊玩宣導系統 ◆</div>
        <button id="start-btn" class="roc-btn" onclick="enterGame()">會員身分驗證登入暨 e 化線上遊玩系統 (Enter)</button>
        <button class="roc-btn btn-yellow" onclick="skipTutorial()">新手引導教學關卡 e 化快速略過申請專區 (Skip)</button>
        <button class="roc-btn btn-blue" onclick="loadLevelCode()">自訂關卡密碼憑證 e 化登錄檢驗窗口 (Custom)</button>
        <button class="roc-btn btn-gold" onclick="window.open('editor.html', '_blank')">◆ 本系統專屬 e 化自訂關卡開發者工作室入口 (Studio)</button>
    </div>

    <div id="dialog-overlay" class="hidden">
        <div id="dialog-box">
            <div id="dialog-content">
                ● <b>WASD</b> 移動角色。<br>
                ● 按 <b>E 鍵</b> 切換上帝/側面視角。<br>
                ● 側面視角下：W 跳躍、S 蹲下。<br>
                ● 按「空白鍵」或點擊此處開始。
            </div>
            <div id="dialog-footer">▼ 點擊或按下空白鍵繼續確認作業</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- DOM 自動演示 UI - 華國美學窗口 -->
    <div id="demo-controls" style="position: absolute; top: 45px; right: 20px; z-index: 9999;">
        <button id="run-demo-btn" class="roc-btn btn-yellow" onclick="runDomDemo()"
            style="padding: 10px 18px; font-size: 15px;">[ 系統自動化 e 化展演測試窗口 (Demo) ]</button>
    </div>

    <script>
        // 診斷工具：捕捉執行期錯誤並顯示
        window.onerror = function (msg, url, line, col, error) {
            alert("遊戲錯誤: " + msg + "\n行號: " + line + "\n內容: " + (error ? error.stack : ""));
            return false;
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const viewInfo = document.getElementById('view-info');
        const dialogOverlay = document.getElementById('dialog-overlay');
        const dialogContent = document.getElementById('dialog-content');
        const dialogFooter = document.getElementById('dialog-footer');

        // --- 【強化版】Dom 自動測試演示功能 ---
        async function runDomDemo() {
            const btn = document.getElementById('run-demo-btn');
            btn.disabled = true; btn.style.background = "#777"; btn.innerText = "Dom 正在表演...";

            const press = (key, ms) => new Promise(res => { keys[key] = true; setTimeout(() => { keys[key] = false; res(); }, ms); });
            const wait = (ms) => new Promise(res => setTimeout(res, ms));

            try {
                // 0. 強制重置到起點安全位置，並開啟演示保護
                player.x = world.x + world.width / 2 - 15;
                player.y = world.y + world.height - 80;
                player.isDemoProtected = true; // 新增：演示保護標記
                if (viewMode !== 'topdown') toggleView();
                await wait(1000);

                // 1. 上帝視角：微調到起跳點
                await press('w', 200);
                await press('a', 150);
                await wait(500);

                // 2. 切換側面視角
                toggleView(); await wait(1200);

                // 3. 第一跳：跳向左方平台 2
                keys['a'] = true;
                await press('w', 100);
                await wait(1100);
                keys['a'] = false;
                await wait(800);

                // 4. 第二跳：跳向右方平台 3
                keys['d'] = true;
                await press('w', 100);
                await wait(1000);
                keys['d'] = false;
                await wait(800);

                // 5. 第三跳：跳向終點平台
                keys['d'] = true;
                await press('w', 100);
                await wait(1200);
                keys['d'] = false;
                await wait(1000);

                // 6. 切回上帝視角，大步走向終點
                toggleView(); await wait(1000);
                await press('w', 1500);

                btn.innerText = "Dom 完勝過關！";
            } catch (e) {
                console.error(e);
                btn.innerText = "演示中斷";
            } finally {
                player.isDemoProtected = false;
                btn.disabled = false;
                btn.style.background = "#00ffcc";
                setTimeout(() => btn.innerText = "[ Dom 自動演示測試 ]", 3000);
            }
        }

        // 初始化畫布大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 定義遊戲世界邊界與外觀屬性
        const world = {
            x: 50,
            y: 50,
            width: 800,
            height: 600,
            borderColor: '#00ffcc',
            borderWidth: 2
        };

        const obstacles = [];
        const NUM_OBSTACLES = 8;

        // 角色屬性
        const player = {
            x: world.x + world.width / 2 - 15,
            y: world.y + world.height / 2,
            width: 30, height: 30, baseHeight: 30,
            color: '#00ffcc',
            speed: 5,
            vx: 0, vy: 0,
            jumpPower: -14,
            onGround: false,
            touchingWallLeft: false, touchingWallRight: false,
            autoMove: null, isCrouching: false,
            reboundX: 0, wallJumpTimer: 0,
            lastWallSide: null,
            lockedX: 0,
            elevatedFromSide: false,
            standingOn: null,
            isClinging: false,
            clingSide: null,
            clingingX: 0,
            clingingY: 0,
            coyoteTimer: 0, // 新增：土狼時間計時器
            tutorialJumped: false, // 教學：是否已跳躍
            isDying: false, // 新增：是否正在進行死亡動畫
            deathAnimTimer: 0 // 新增：死亡動畫計時器
        };

        let audioCtx = null; // 用於播放音效
        let shakeAmount = 0; // 螢幕震動強度
        let deathFlashOpacity = 0; // 死亡紅閃效果不透明度

        function playTone(freq, duration, type = 'sine') {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) { console.log("音效播放失敗", e); }
        }

        function playerDie() {
            if (player.isDying) return;
            player.isDying = true;
            player.deathAnimTimer = 0;
            shakeAmount = 15; // 觸發強烈震動
            deathFlashOpacity = 0.6; // 觸發紅色閃爍
            playTone(150, 0.4, 'triangle'); // 播放低沈的死亡音效

            // 停止目前的自動移動
            player.autoMove = null;
        }

        let isStartScreen = true; // 是否顯示開始畫面
        let isDialogOpen = false;
        let isTransitioning = false;
        let transitionT = 0;
        const transitionDuration = 0.8; // 動畫持續秒數
        let lastTimestamp = 0;
        let transitionStartPlayer = { x: player.x, y: player.y };
        let transitionEndPlayer = { x: player.x, y: player.y };
        let transitionOldView = 'topdown';
        let isDimmed = false; // 對話框是否變淡 (嘗試操作中)
        let currentLevel = 0; // 當前關卡
        const maxLevel = 10; // 最大關卡
        const lavaLevels = [5, 7, 9, 10]; // 哪些關卡有岩漿地板
        let isVictory = false; // 是否已通關

        let dialogStep = 0; // 0: 無對話框, 1: 冒險者指南, 2: 視角切換教學
        let viewMode = 'topdown';
        const gravity = 0.6;

        // 1. 定義輔助函數
        function generateObstacles() {
            if (currentLevel === -1) return;
            obstacles.length = 0;

            const wx = world.x, wy = world.y, ww = world.width, wh = world.height;

            if (currentLevel === 0) {
                // 教學關：視情況顯示箱子
                const showTutorialBox = (dialogStep > 5) || (dialogStep === 5 && isDimmed) || (dialogStep === 0 && !isDialogOpen && !isStartScreen);
                if (showTutorialBox) {
                    obstacles.push({ x: wx + ww/2 - 50, y: wy + 120, baseWidth: 100, baseHeight: 120, baseDepth: 100, color: '#777' });
                }

            } else if (currentLevel === 1) {
                // ★ 第 1 關「踏石問路」— 單純上帝視角走迷宮，認識障礙物
                // 左側牆
                obstacles.push({ x: wx + 50,  y: wy + 80,  baseWidth: 200, baseHeight: 120, baseDepth: 80,  color: '#4a6080' });
                // 中間橫牆（留左右小缺口）
                obstacles.push({ x: wx + 120, y: wy + 220, baseWidth: 400, baseHeight: 120, baseDepth: 60,  color: '#3d7055' });
                // 右側單塊
                obstacles.push({ x: wx + 560, y: wy + 100, baseWidth: 120, baseHeight: 120, baseDepth: 120, color: '#6a4070' });
                // 下方右角
                obstacles.push({ x: wx + 500, y: wy + 350, baseWidth: 180, baseHeight: 120, baseDepth: 130, color: '#70603a' });
                // 左下角
                obstacles.push({ x: wx + 50,  y: wy + 400, baseWidth: 130, baseHeight: 120, baseDepth: 100, color: '#4a6080' });

            } else if (currentLevel === 2) {
                // ★ 第 2 關「高台跳躍」— 側面視角跳上高台走過去
                // 中間高牆（必須跳過）
                obstacles.push({ x: wx + 200, y: wy + 80, baseWidth: 80, baseHeight: 350, baseDepth: 500, color: '#5566aa' });
                // 右側跳台 (側面視角可見)
                obstacles.push({ x: wx + 380, y: wy + 100, baseWidth: 180, baseHeight: 180, baseDepth: 400, color: '#3d9055' });
                // 左邊起跳台
                obstacles.push({ x: wx + 80,  y: wy + 80,  baseWidth: 80,  baseHeight: 100, baseDepth: 500, color: '#665544' });

            } else if (currentLevel === 3) {
                // ★ 第 3 關「兩視角切換」— 需要切換視角繞過 L 形障礙
                // 水平牆（上帝可見，擋住直行）
                obstacles.push({ x: wx + 80,  y: wy + 180, baseWidth: 550, baseHeight: 120, baseDepth: 80,  color: '#aa5533' });
                // 垂直牆（側面可見，頂部有豁口）
                obstacles.push({ x: wx + 350, y: wy + 80,  baseWidth: 80,  baseHeight: 200, baseDepth: 100, color: '#3388aa' });
                // 右側跳台
                obstacles.push({ x: wx + 520, y: wy + 80,  baseWidth: 120, baseHeight: 80,  baseDepth: 350, color: '#559933' });
                // 左角擋牆
                obstacles.push({ x: wx + 80,  y: wy + 80,  baseWidth: 80,  baseHeight: 120, baseDepth: 100, color: '#887733' });

            } else if (currentLevel === 4) {
                // ★ 第 4 關「階梯天堂」— 三層階梯，需側面視角跳上去後上帝視角穿越
                // 階梯 1 (最低)
                obstacles.push({ x: wx + 80,  y: wy + 80,  baseWidth: 150, baseHeight: 80,  baseDepth: 180, color: '#7755aa' });
                // 階梯 2 (中間)
                obstacles.push({ x: wx + 260, y: wy + 80,  baseWidth: 150, baseHeight: 160, baseDepth: 180, color: '#5577aa' });
                // 階梯 3 (最高)
                obstacles.push({ x: wx + 440, y: wy + 80,  baseWidth: 150, baseHeight: 260, baseDepth: 180, color: '#3399aa' });
                // 頂部平台（上帝視角下走到出口）
                obstacles.push({ x: wx + 80,  y: wy + 350, baseWidth: 520, baseHeight: 80,  baseDepth: 80,  color: '#556655' });
                // 右側擋路
                obstacles.push({ x: wx + 620, y: wy + 150, baseWidth: 60,  baseHeight: 250, baseDepth: 350, color: '#773333' });

            } else if (currentLevel === 5) {
                // ★ 第 5 關「岩漿跳島」— 地板有岩漿，必須跳島前進
                // 起始小島（玩家出生在這）
                obstacles.push({ x: wx + 300, y: wy + 480, baseWidth: 180, baseHeight: 120, baseDepth: 100, color: '#888866' });
                // 中間小島 1
                obstacles.push({ x: wx + 100, y: wy + 300, baseWidth: 120, baseHeight: 140, baseDepth: 120, color: '#668866' });
                // 中間小島 2
                obstacles.push({ x: wx + 350, y: wy + 200, baseWidth: 100, baseHeight: 160, baseDepth: 100, color: '#668866' });
                // 中間小島 3
                obstacles.push({ x: wx + 560, y: wy + 300, baseWidth: 130, baseHeight: 140, baseDepth: 120, color: '#668866' });
                // 終點平台
                obstacles.push({ x: wx + 300, y: wy + 80,  baseWidth: 200, baseHeight: 120, baseDepth: 150, color: '#aaaa44' });

            } else if (currentLevel === 6) {
                // ★ 第 6 關「隱形橋」— 上帝視角看不見橋，側面才看得到（橋細而長）
                // 粗大擋牆（橫向）
                obstacles.push({ x: wx + 100, y: wy + 80,  baseWidth: 80,  baseHeight: 120, baseDepth: 450, color: '#6644aa' });
                obstacles.push({ x: wx + 620, y: wy + 80,  baseWidth: 80,  baseHeight: 120, baseDepth: 450, color: '#6644aa' });
                // 細橋（高度高，但上帝視角 depth 很小故幾乎不可見）
                obstacles.push({ x: wx + 180, y: wy + 280, baseWidth: 440, baseHeight: 300, baseDepth: 20,  color: '#44aaaa' });
                // 引導牆
                obstacles.push({ x: wx + 300, y: wy + 420, baseWidth: 200, baseHeight: 120, baseDepth: 120, color: '#554433' });

            } else if (currentLevel === 7) {
                // ★ 第 7 關「岩漿迷城」— 地板岩漿，上帝視角複雜迷宮
                obstacles.push({ x: wx + 50,  y: wy + 470, baseWidth: 700, baseHeight: 120, baseDepth: 80,  color: '#557744' });
                obstacles.push({ x: wx + 50,  y: wy + 80,  baseWidth: 120, baseHeight: 120, baseDepth: 390, color: '#557744' });
                obstacles.push({ x: wx + 200, y: wy + 200, baseWidth: 120, baseHeight: 120, baseDepth: 270, color: '#446655' });
                obstacles.push({ x: wx + 350, y: wy + 80,  baseWidth: 120, baseHeight: 120, baseDepth: 270, color: '#446655' });
                obstacles.push({ x: wx + 500, y: wy + 200, baseWidth: 120, baseHeight: 120, baseDepth: 270, color: '#557744' });
                obstacles.push({ x: wx + 630, y: wy + 80,  baseWidth: 120, baseHeight: 120, baseDepth: 390, color: '#557744' });

            } else if (currentLevel === 8) {
                // ★ 第 8 關「雙重視角謎題」— 兩個視角都要用，高台+迷宮雙重挑戰
                // 上帝視角的「L」形牆
                obstacles.push({ x: wx + 80,  y: wy + 80,  baseWidth: 500, baseHeight: 120, baseDepth: 60,  color: '#5566cc' });
                obstacles.push({ x: wx + 80,  y: wy + 80,  baseWidth: 60,  baseHeight: 120, baseDepth: 380, color: '#5566cc' });
                // 需跳過的高台
                obstacles.push({ x: wx + 250, y: wy + 200, baseWidth: 200, baseHeight: 280, baseDepth: 200, color: '#cc6633' });
                // 右側通道引導
                obstacles.push({ x: wx + 560, y: wy + 160, baseWidth: 60,  baseHeight: 120, baseDepth: 340, color: '#5566cc' });
                // 底部擋牆
                obstacles.push({ x: wx + 80,  y: wy + 460, baseWidth: 640, baseHeight: 120, baseDepth: 60,  color: '#334455' });

            } else if (currentLevel === 9) {
                // ★ 第 9 關「熔岩跑酷」— 岩漿地板 + 高速跳躍連跳考驗
                // 出生平台
                obstacles.push({ x: wx + 300, y: wy + 430, baseWidth: 180, baseHeight: 130, baseDepth: 120, color: '#888855' });
                // 跳台連鎖（間距逐漸加大）
                obstacles.push({ x: wx + 100, y: wy + 350, baseWidth: 100, baseHeight: 150, baseDepth: 80,  color: '#6688aa' });
                obstacles.push({ x: wx + 550, y: wy + 260, baseWidth: 100, baseHeight: 170, baseDepth: 80,  color: '#6688aa' });
                obstacles.push({ x: wx + 200, y: wy + 160, baseWidth: 100, baseHeight: 190, baseDepth: 80,  color: '#6688aa' });
                obstacles.push({ x: wx + 450, y: wy + 80,  baseWidth: 120, baseHeight: 210, baseDepth: 100, color: '#aabb44' });
                // 終點高台
                obstacles.push({ x: wx + 300, y: wy + 80,  baseWidth: 120, baseHeight: 220, baseDepth: 90,  color: '#ffcc44' });

            } else if (currentLevel === 10) {
                // ★ 第 10 關「終極次元」— 岩漿+複雜地形+需精確操作雙視角
                // 起點島
                obstacles.push({ x: wx + 330, y: wy + 420, baseWidth: 140, baseHeight: 130, baseDepth: 130, color: '#888855' });
                // 第一段：上帝視角繞行
                obstacles.push({ x: wx + 80,  y: wy + 300, baseWidth: 200, baseHeight: 120, baseDepth: 100, color: '#5577bb' });
                obstacles.push({ x: wx + 540, y: wy + 300, baseWidth: 180, baseHeight: 120, baseDepth: 100, color: '#5577bb' });
                // 中段高台（側面跳躍）
                obstacles.push({ x: wx + 200, y: wy + 180, baseWidth: 160, baseHeight: 250, baseDepth: 120, color: '#cc5533' });
                obstacles.push({ x: wx + 440, y: wy + 180, baseWidth: 160, baseHeight: 200, baseDepth: 120, color: '#cc5533' });
                // 最終衝刺橋（細而高）
                obstacles.push({ x: wx + 280, y: wy + 80,  baseWidth: 240, baseHeight: 320, baseDepth: 100, color: '#ffcc00' });
                // 左右危險牆
                obstacles.push({ x: wx + 80,  y: wy + 80,  baseWidth: 60,  baseHeight: 120, baseDepth: 500, color: '#aa3333' });
                obstacles.push({ x: wx + 660, y: wy + 80,  baseWidth: 60,  baseHeight: 120, baseDepth: 500, color: '#aa3333' });
            }

            // 若方塊位於該位置，改為標記「站在障礙物上」而非彈開
            for (let i = 0; i < obstacles.length; i++) {
                let o = getObsRect(obstacles[i]);
                if (!o) continue;
                if (player.x < o.x + o.w && player.x + player.width > o.x &&
                    player.y < o.y + o.h && player.y + player.height > o.y) {
                    player.elevatedFromSide = true;
                    player.standingOn = i;
                }
            }
        }

        // 3. 最後才執行初始化呼叫
        generateObstacles();

        function enterGame() {
            isStartScreen = false;

        function skipTutorial() {

        function loadLevelCode() {
            const code = prompt("【系統登錄提示】請輸入或貼上經核發之自訂關卡密碼憑證字串：");
            if (!code) return;
            try {
                // 解碼 Base64 (支援 UTF-8)
                const data = JSON.parse(decodeURIComponent(escape(atob(code))));
                
                // 注入地圖數據
                Object.assign(world, data.world);
                obstacles.length = 0;
                obstacles.push(...data.obstacles);
                
                // 介面切換
                isStartScreen = false;
                document.getElementById('start-screen').classList.add('hidden');
                dialogOverlay.classList.add('hidden');
                
                // 標記為自定義關卡並啟動
                currentLevel = -1; 
                isDialogOpen = false;
                setupLevelTransition();
            } catch (e) {
                alert("【系統警告】您所輸入之憑證字串無法通過系統檢驗！請確認是否完整複製或洽詢發證窗口。");
            }
        }

            if (location.search.includes('custom=true')) {
                const rawData = localStorage.getItem('customLevelData');

                        Object.assign(world, data.world);
                        obstacles.length = 0;
                        obstacles.push(...data.obstacles);
                        
                        isStartScreen = false;
                        document.getElementById('start-screen').classList.add('hidden');
                        const overlay = document.getElementById('dialog-overlay');
                        if (overlay) overlay.classList.add('hidden');

                        isDialogOpen = false;
                        setupLevelTransition();

        }
        window.addEventListener('DOMContentLoaded', initCustomLevel);

        const TUTORIAL_CHARACTER_NAME = "快龍導覽員 / 本系統服務窗口";

        // 根據 dialogStep 顯示不同的教學內容
        function showVictoryScreen() {
            isVictory = true;
            isDialogOpen = true;
            dialogOverlay.classList.remove('hidden');
            dialogContent.innerHTML = `
            <h2 style="color: var(--roc-yellow); font-size: 1.8em; margin-bottom: 15px; border-bottom: 3px double var(--roc-yellow); padding-bottom: 10px;">🏆 【行政公告】恭喜完成二點五維度空間轉換全數十階段演練作業！</h2>

            <p>◆ 本專案推動委員會感謝您的熱烈參與與配合！共創 e 化便民多維度新紀元！ 🌀</p>
        `;
            dialogFooter.innerHTML = '<button class="roc-btn btn-gold" onclick="location.reload()">◆ 重新啟動本系統演練作業 (Restart)</button>';

        function showDialogContent() {
            const dialogue = getDialogueText(dialogStep);
            dialogContent.innerHTML = dialogue.content;

            // 確保在教學步驟中正確生成障礙物
            generateObstacles();

            // 更新對話框外觀 (isDimmed 代表進入嘗試操作階段)
            if (isDimmed) {
                dialogOverlay.classList.add('trying-action');
                // 根據步驟決定淡化時的腳註
                if (dialogStep === 2) dialogFooter.innerHTML = `▼ 點擊以繼續`;
                else if (dialogStep === 3) dialogFooter.innerHTML = `(請按下 E 切換視角)`;
                else if (dialogStep === 4) dialogFooter.innerHTML = `(請跳躍)`;
                else if (dialogStep === 5) dialogFooter.innerHTML = `(請跳到箱子上)`;
                else if (dialogStep === 6) dialogFooter.innerHTML = `(請按下 E 切換視角)`;
                else if (dialogStep === 7) dialogFooter.innerHTML = `(請直接走出箱子範圍)`;
            } else {
                dialogOverlay.classList.remove('trying-action');
                dialogFooter.innerHTML = dialogue.footer;

                // 第 8 步：展示紅線切片，但不自動切換視角
                if (dialogStep === 8) {
                    dialogFooter.innerHTML = "▼ 點擊以繼續";
                }
            }
        }

        const keys = {};
        window.addEventListener('keydown', e => {
            const isControlKey = e.key === ' ' || e.key === 'Enter';

            // 1. 對話框深色時，除了繼續鍵，阻斷所有輸入
            if (isDialogOpen && !isDimmed) {
                if (isControlKey) {
                    e.preventDefault();
                    closeDialog();
                }
                return;
            }

            // 2. 教學嘗試階段，空白/Enter 用於回到對話
            if (isDialogOpen && isDimmed && isControlKey) {
                e.preventDefault();
                closeDialog();
                return;
            }

            // 3. 視角切換控制
            if (e.key === 'e' || e.key === 'E') {
                if (isVictory) return;
                const allowedToggleSteps = [3, 6];
                if (!isDialogOpen || (isDialogOpen && isDimmed && allowedToggleSteps.includes(dialogStep))) {
                    if (!isTransitioning && !player.isDying) toggleView();
                }
                return;
            }

            // 4. 【測試用】按 L 直接進下一關
            if (e.key === 'l' || e.key === 'L') {
                if (!isStartScreen && !isVictory) {
                    currentLevel++;
                    if (currentLevel > maxLevel) currentLevel = maxLevel;
                    setupLevelTransition();
                }
                return;
            }

            // 4. 嘗試階段的按鍵過濾
            if (isDialogOpen && isDimmed) {
                if (dialogStep === 2) {
                    const isMoveKey = ['w', 'a', 's', 'd', 'W', 'A', 'S', 'D', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key);
                    if (!isMoveKey) return;
                }
                if ((e.key === 'x' || e.key === 'X') && dialogStep !== 7) return;
            }

            keys[e.key] = true;
        });
        window.addEventListener('keyup', e => keys[e.key] = false);
        window.addEventListener('blur', () => {
            for (let k in keys) keys[k] = false;
            player.autoMove = null; player.wallJumpTimer = 0; player.lastWallSide = null;
        });
        dialogOverlay.addEventListener('click', closeDialog);

        function closeDialog() {
            // 關閉或切換對話時，清除目前的按鍵狀態，防止角色在深色對話框時自動滑動
            for (let k in keys) keys[k] = false;
            player.autoMove = null;

            if (dialogStep === 1) {
                dialogStep = 2;
            } else if (dialogStep === 2) {
                // 上帝視角移動教學：點擊變淡 -> 點擊變深並進入下一步
                if (!isDimmed) {
                    isDimmed = true;
                } else {
                    isDimmed = false;
                    dialogStep = 3;
                }
            } else if (dialogStep === 3) {
                if (!isDimmed) isDimmed = true;
            } else if (dialogStep === 4) {
                // 側面跳躍教學：點擊變淡 -> 透過跳躍動作變深進入下一步
                if (!isDimmed) {
                    isDimmed = true;
                    player.tutorialJumped = false;
                }
            } else if (dialogStep === 5) {
                if (!isDimmed) {
                    isDimmed = true;
                    generateObstacles(); // 在此時生成教學用的箱子
                }
            } else if (dialogStep === 6) {
                if (!isDimmed) isDimmed = true;
            } else if (dialogStep === 7) {
                if (!isDimmed) isDimmed = true;
            } else if (dialogStep === 8) {
                // 第 8 步：點擊即可繼續，如果目前在側面視角則自動切回上帝視角
                if (viewMode === 'sideview' && !isTransitioning) {
                    toggleView();
                }
                dialogStep = 9;
            } else if (dialogStep === 9) {
                isDialogOpen = false;
                dialogOverlay.classList.add('hidden');
                player.elevatedFromSide = false; // 確保玩家不再被視為站在箱子上
                player.standingOn = null;
                dialogStep = 0;
            }
            showDialogContent();
        }

        function toggleView() {
            const oldX = player.x;
            const oldY = player.y;
            const oldViewMode = viewMode;

            // 紀錄轉換前狀態用於動畫
            transitionStartPlayer = { x: oldX, y: oldY };
            transitionOldView = oldViewMode;
            // 只有從上帝視角轉到側面視角才播放動畫，反過來則直接跳轉
            if (oldViewMode === 'topdown') {
                isTransitioning = true;
                transitionT = 0;
            } else {
                isTransitioning = false;
                transitionT = 1;
            }

            viewMode = (oldViewMode === 'topdown') ? 'sideview' : 'topdown';
            viewInfo.innerText = `【本系統當前監控狀態】 ＞ ${viewMode === 'topdown' ? '上帝平面視角模式' : '側面視角模式'} (※ 按 E 鍵切換 e 化視圖)`;

            // 教學特定邏輯：偵測視角切換
            if (isDialogOpen && isDimmed) {
                if (dialogStep === 3 && !player.tutorialViewToggled) {
                    player.tutorialViewToggled = true;
                    isDimmed = false;
                    dialogStep = 4;
                    showDialogContent();
                } else if (dialogStep === 6 && viewMode === 'topdown') {
                    isDimmed = false;
                    dialogStep = 7;
                    showDialogContent();
                }
            }
            // --- 視角切換核心邏輯 ---
            if (oldViewMode === 'topdown') {
                // 從 上帝視角 (XZ) 轉到 側面視角 (ZY)
                player.lockedX = oldX; 
                const zRel = oldY - world.y;

                // 側視圖的 X 軸其實是 Topdown 的 Y 軸 (Z軸)
                // 修正：使用 world.height 確保 Z 軸長度一致
                player.x = world.x + (world.height - zRel - player.width);

                // 處理高度 Y：如果原本是在箱子上，切換後應維持在該箱子的高度
                if (player.elevatedFromSide && player.standingOn !== null) {
                    const obs = obstacles[player.standingOn];
                    player.y = world.y + world.height - obs.baseHeight - player.height;
                } else {
                    player.y = world.y + world.height - player.height;
                }
            } else {
                // 從 ZY (Sideview) 轉回 XZ (Topdown)
                const sideRelX = oldX - world.x;
                const heightAboveGround = (world.y + world.height) - (oldY + player.height);

                player.x = player.lockedX; // 恢復 X 軸
                // 逆推 Z 軸位置 (Topdown 的 Y)
                player.y = world.y + (world.height - sideRelX - player.width);

                // 【修復】原本的攀附邏輯會誤將碰到箱子邊緣的玩家傳送到世界邊界，現在改為僅限世界邊界
                if (player.touchingWallLeft || player.touchingWallRight) {
                    // 檢查是否真的接近世界邊界 (左右各 5 像素內)
                    const isAtWorldLeft = (viewMode === 'sideview' && oldX <= world.x + 5);
                    const isAtWorldRight = (viewMode === 'sideview' && oldX + player.width >= world.x + world.height - 5);

                    if (isAtWorldLeft || isAtWorldRight) {
                        player.isClinging = true;
                        player.clingSide = isAtWorldLeft ? 'bottom' : 'top';
                        player.clingingX = player.x;
                        player.clingingY = (player.clingSide === 'bottom') ? (world.y + world.height - player.height) : world.y;
                        player.reboundX = 0;
                    }
                }

                // 如果在側視圖時有高度，切換後標記為「站在箱子上」
                if (heightAboveGround > 1) {
                    player.elevatedFromSide = true;
                    player.standingOn = null;
                    // 【優化】重新掃描當前位置下方是哪個箱子，加入 2 像素的小誤差容許量
                    for (let i = 0; i < obstacles.length; i++) {
                        let o = getObsRect(obstacles[i]);
                        if (o && player.x < o.x + o.w + 2 && player.x + player.width > o.x - 2 &&
                            player.y < o.y + o.h + 2 && player.y + player.height > o.y - 2) {
                             player.standingOn = i;
                            break;
                        }
                    }
                    if (player.standingOn === null) player.elevatedFromSide = false;
                } else {
                    player.elevatedFromSide = false;
                    player.standingOn = null;
                }
            }

            player.vy = 0;
            player.height = player.baseHeight;
            player.isCrouching = false;
            player.reboundX = 0;
            player.wallJumpTimer = 0;
            player.lastWallSide = null;
            if (viewMode === 'sideview') player.isClinging = false;

            // 紀錄轉換後預期位置
            transitionEndPlayer = { x: player.x, y: player.y };
        }

        function getObsRect(obs) {
            if (!obs) return null;
            if (viewMode === 'topdown') {
                return { x: obs.x, y: obs.y, w: obs.baseWidth, h: obs.baseDepth };
            } else {
                if (player.lockedX + player.width > obs.x && player.lockedX < obs.x + obs.baseWidth) {
                    return {
                        // 修正：側面投影寬度應對應上帝視角的高度 (Z軸)
                        x: world.x + world.height - (obs.y - world.y) - obs.baseDepth,
                        y: world.y + world.height - obs.baseHeight,
                        w: obs.baseDepth,
                        h: obs.baseHeight
                    };
                }
                return null;
            }
        }


        // 封裝關卡切換的初始化邏輯
        function setupLevelTransition() {
            // 先重置一些關鍵狀態
            player.standingOn = null;
            player.elevatedFromSide = false;
            player.autoMove = null;
            player.vy = 0;

            generateObstacles();
            viewMode = 'topdown';
            if (viewInfo) viewInfo.innerText = `【本系統當前監控狀態】 ＞ 上帝平面視角模式 (※ 按 E 鍵切換 e 化視圖)`;

            // 每一關都執行安全重生檢測
            respawnPlayer();
        }

        function respawnPlayer() {
            const startX = world.x + world.width / 2 - player.width / 2;
            const startY = world.y + world.height - player.height - 20;

            if (viewMode === 'topdown') {
                player.x = startX;
                player.y = startY;
            } else {
                // 在側面模式下，設定正確的 Z 軸視覺位置與鎖定位置 (X 軸)
                player.lockedX = startX;
                const zRel = startY - world.y;
                player.x = world.x + (world.height - zRel - player.width);
                player.y = world.y + world.height - player.height;
            }

            player.vy = 0;
            player.elevatedFromSide = false;
            player.standingOn = null;

            // 立即尋找起點平台 (getObsRect 會根據目前的 viewMode 回傳矩形)
            for (let i = 0; i < obstacles.length; i++) {
                let o = getObsRect(obstacles[i]);
                if (o && player.x < o.x + o.w && player.x + player.width > o.x &&
                    player.y < o.y + o.h && player.y + player.height > o.y) {
                    player.elevatedFromSide = true;
                    player.standingOn = i;

                    // 【關鍵修復】如果是在側面模式且踏在平台上，強制將高度設為平台頂端
                    // 否則在岩漿關卡會因為碰到「地板」而立即觸發死亡循環
                    if (viewMode === 'sideview') {
                        player.y = o.y - player.height;
                        player.onGround = true;
                        player.vy = 0;
                    }
                    break;
                }
            }
        }

        // 更新邏輯
        function update(dt) {
            if (isStartScreen) return;

            // 【新增】處理螢幕震動與紅閃冷卻
            if (shakeAmount > 0) {
                shakeAmount *= 0.9;
                if (shakeAmount < 0.1) shakeAmount = 0;
            }
            if (deathFlashOpacity > 0) {
                deathFlashOpacity -= dt * 1.5;
                if (deathFlashOpacity < 0) deathFlashOpacity = 0;
            }

            // 【新增】處理死亡動畫計時
            if (player.isDying) {
                player.deathAnimTimer += dt;
                if (player.deathAnimTimer >= 0.8) {
                    player.isDying = false;
                    player.deathAnimTimer = 0;
                    respawnPlayer();
                }
                return; // 死亡期間停止所有物理與輸入
            }

            // 【新增】處理視角切換動畫進度
            if (isTransitioning) {
                transitionT += dt / transitionDuration;
                if (transitionT >= 1) {
                    transitionT = 1;
                    isTransitioning = false;
                }
                return; // 切換期間不跑物理邏輯
            }

            if (isDialogOpen) {
                // 如果對話框深色且不是嘗試階段，完全停止物理
                if (!isDimmed) return;

                // 在淡化模式 (嘗試中) 偵測動作
                if (dialogStep === 2 && !player.tutorialMoved) {
                    if (viewMode === 'topdown' && (
                        keys['a'] || keys['A'] || keys['ArrowLeft'] ||
                        keys['d'] || keys['D'] || keys['ArrowRight'] ||
                        keys['w'] || keys['W'] || keys['ArrowUp'] ||
                        keys['s'] || keys['S'] || keys['ArrowDown']
                    )) {
                        player.tutorialMoved = true;
                    }
                }

                if (dialogStep === 4) {
                    // 1. 偵測跳躍開始 (在地面按下跳躍鍵)
                    if (!player.tutorialJumped) {
                        if (viewMode === 'sideview' && (keys['w'] || keys['W'] || keys['ArrowUp']) && player.onGround) {
                            player.tutorialJumped = true;
                        }
                    }
                    // 2. 偵測跳躍結束 (落地)
                    else if (player.onGround) {
                        isDimmed = false;
                        dialogStep = 5;
                        showDialogContent();
                    }
                }

                if (dialogStep === 5 && isDimmed) {
                    // 偵測是否跳上箱子 (在側面視角且不在地面高度)
                    if (viewMode === 'sideview' && player.onGround && player.y < world.y + world.height - player.height - 10) {
                        isDimmed = false;
                        dialogStep = 6;
                        showDialogContent();
                    }
                }

                if (dialogStep === 7 && isDimmed) {
                    // 偵測是否已跳下箱子 (原本在箱子上，按下 X 後由物理邏輯將 elevatedFromSide 重置為 false)
                    if (viewMode === 'topdown' && !player.elevatedFromSide) {
                        isDimmed = false;
                        dialogStep = 8;
                        showDialogContent();
                    }
                }

                // 只有在對話框開啟時，且不是動作教學步驟，才阻斷物理更新
                const actionSteps = [2, 3, 4, 5, 6, 7];
                if (isDialogOpen && !actionSteps.includes(dialogStep)) return;
            }

            if (isVictory) return;

            // 【新增】死亡判定 (地板是岩漿)
            if (lavaLevels.includes(currentLevel)) {
                let isOnFloor = false;
                if (viewMode === 'sideview') {
                    if (player.y + player.height >= world.y + world.height - 2) isOnFloor = true;
                } else {
                    // 上帝模式下，如果沒有 standingOn (沒站在東西上) 就是在岩漿上
                    if (!player.elevatedFromSide) isOnFloor = true;
                }

                if (isOnFloor) {
                    if (!player.isDemoProtected) playerDie();
                    return;
                }
            }

            // 更新土狼時間：若在地面則重置計時器，若在空中則遞減
            if (player.onGround) {
                player.coyoteTimer = 8; // 給予 8 個影格的寬限期 (約 0.13 秒)
            } else if (player.coyoteTimer > 0) {
                player.coyoteTimer--;
            }

            // 1. 跳躍輸入偵測
            if (viewMode === 'sideview' && (keys['w'] || keys['W'] || keys['ArrowUp'])) {
                if (player.coyoteTimer > 0) {
                    player.vy = player.jumpPower;
                    player.onGround = false;
                    player.coyoteTimer = 0; // 觸發跳躍後立即歸零，防止二段跳
                    // 教學特定邏輯：偵測跳躍 (已在上方處理)
                    player.lastWallSide = null;
                } else if (player.touchingWallLeft && player.lastWallSide !== 'left') {
                    player.vy = player.jumpPower; player.reboundX = player.speed * 2.5; player.wallJumpTimer = 15; player.lastWallSide = 'left';
                } else if (player.touchingWallRight && player.lastWallSide !== 'right') {
                    player.vy = player.jumpPower; player.reboundX = -player.speed * 2.5; player.wallJumpTimer = 15; player.lastWallSide = 'right';
                }
            }

            const oldPlayerX = player.x;
            const oldPlayerY = player.y;
            const oldPlayerHeight = player.height;
            player.touchingWallLeft = false;
            player.touchingWallRight = false;

            const hasInput = Object.values(keys).some(v => v === true);
            if (hasInput) player.autoMove = null;

            let ex, ey, ew, eh;
            const currentWidth = (viewMode === 'topdown') ? world.width : world.height;
            if (viewMode === 'topdown') {
                ex = world.x + world.width / 2 - 40; ey = world.y - 20; ew = 80; eh = 20.5;
            } else {
                ex = world.x + world.height - 0.5; ey = world.y + (world.height - 80) / 2; ew = 20; eh = 80;
            }

            if (player.x < ex + ew && player.x + player.width > ex && player.y < ey + eh && player.y + player.height > ey) {
                // 在教學期間，若不是正在讓玩家「嘗試過關」的步驟，不觸發換關
                const tutorialAllowedSteps = [0, 9]; // 教學結束後或最後一步
                if (isDialogOpen && !tutorialAllowedSteps.includes(dialogStep)) {
                    // 暫不處理
                } else {
                    if (currentLevel < maxLevel) {
                        currentLevel++;
                        setupLevelTransition();
                    } else if (!isVictory) {
                        showVictoryScreen();
                    }
                    return; // 換關後不繼續處理當前影格
                }
            }


            let moveX = 0, moveY = 0;
            if (keys['a'] || keys['A'] || keys['ArrowLeft']) moveX = -1;
            if (keys['d'] || keys['D'] || keys['ArrowRight']) moveX = 1;
            if (keys['w'] || keys['W'] || keys['ArrowUp']) moveY = -1;
            if (keys['s'] || keys['S'] || keys['ArrowDown']) moveY = 1;

            if (moveX === 0 && moveY === 0 && player.autoMove) {
                moveX = player.autoMove.x; moveY = player.autoMove.y;
            }

            // 處理上帝模式下的「下牆」邏輯 (攀附世界邊界)
            if (player.isClinging && viewMode === 'topdown') {
                const moveOff = (player.clingSide === 'bottom' && moveY < 0) || (player.clingSide === 'top' && moveY > 0);
                if (moveOff) {
                    player.isClinging = false;
                    player.autoMove = null;
                } else {
                    // 攀附時禁止 Y 軸輸入 (除非是為了脫離)，但允許 X 軸移動以便沿牆滑行
                    moveY = 0;
                }
            } else if (player.elevatedFromSide && viewMode === 'topdown' && player.standingOn !== null) {
                // 上帝模式下站在障礙物上的釋放邏輯
                const targetObs = obstacles[player.standingOn];
                const o = targetObs ? getObsRect(targetObs) : null;
                if (o) {
                    // 檢查是否完全走出範圍
                    const isOutside = player.x + player.width < o.x || player.x > o.x + o.w || 
                                     player.y + player.height < o.y || player.y > o.y + o.h;
                    
                    if (isOutside) {
                        player.elevatedFromSide = false;
                        player.standingOn = null;
                        player.autoMove = null;
                    }
                } else {
                    player.elevatedFromSide = false;
                    player.standingOn = null;
                }
            }

            if (player.wallJumpTimer > 0) { moveX = 0; player.wallJumpTimer--; }

            if (viewMode === 'sideview') {
                if (keys['s'] || keys['S'] || keys['ArrowDown']) {
                    if (!player.isCrouching) {
                        player.y += (player.baseHeight * 0.4);
                        player.height = player.baseHeight * 0.6;
                        player.isCrouching = true;
                    }
                } else if (player.isCrouching) {
                    let canStand = true;
                    const py = player.y - (player.baseHeight * 0.4);
                    for (const obs of obstacles) {
                        let o = getObsRect(obs);
                        if (!o) continue;
                        if (player.x < o.x + o.w && player.x + player.width > o.x && py < o.y + o.h && py + player.baseHeight > o.y) canStand = false;
                    }
                    if (canStand) { player.y = py; player.height = player.baseHeight; player.isCrouching = false; }
                }
                player.vy += gravity;
            }

            player.x += (moveX * player.speed) + player.reboundX;
            if (viewMode === 'topdown') player.y += moveY * player.speed;
            else player.y += player.vy;

            if (player.reboundX !== 0) {
                player.reboundX *= 0.8;
                if (Math.abs(player.reboundX) < 0.1) player.reboundX = 0;
            }

            for (let i = 0; i < obstacles.length; i++) {
                let o = getObsRect(obstacles[i]);
                if (!o) continue;
                // 如果正站在該障礙物上方，忽略碰撞（改由後方的邊界鎖定邏輯處理）
                if (viewMode === 'topdown' && player.elevatedFromSide && i === player.standingOn) {
                    continue;
                }
                if (player.x < o.x + o.w && player.x + player.width > o.x && oldPlayerY < o.y + o.h && oldPlayerY + oldPlayerHeight > o.y) {
                    if (oldPlayerX + player.width <= o.x) { player.x = o.x - player.width; player.touchingWallRight = true; }
                    else { player.x = o.x + o.w; player.touchingWallLeft = true; }
                }
            }

            player.onGround = false;
            if (viewMode === 'sideview' && player.y + player.height > world.y + world.height) {
                player.y = world.y + world.height - player.height; player.vy = 0; player.onGround = true;
            }

            for (let i = 0; i < obstacles.length; i++) {
                let o = getObsRect(obstacles[i]);
                if (!o) continue;
                if (viewMode === 'topdown' && player.elevatedFromSide && i === player.standingOn) continue;
                if (player.y < o.y + o.h && player.y + player.height > o.y && player.x < o.x + o.w && player.x + player.width > o.x) {
                    if (viewMode === 'topdown') player.y = (oldPlayerY + oldPlayerHeight <= o.y) ? o.y - player.height : o.y + o.h;
                    else {
                        if (oldPlayerY + oldPlayerHeight <= o.y) { player.y = o.y - player.height; player.vy = 0; player.onGround = true; }
                        else if (oldPlayerY >= o.y + o.h - 5) { player.y = o.y + o.h; player.vy = 0; }
                    }
                }
            }

            if (player.x < world.x) { player.x = world.x; player.touchingWallLeft = true; }
            if (player.x + player.width > world.x + currentWidth) { player.x = world.x + currentWidth - player.width; player.touchingWallRight = true; }
            if (player.y < world.y) player.y = world.y;
            if (player.y + player.height > world.y + world.height) { player.y = world.y + world.height - player.height; if (viewMode === 'sideview') player.onGround = true; }

            // 【關鍵鎖定】在上帝模式下，不再強制限制座標在障礙物範圍內 (已改為自由走動脫離)
            if (player.elevatedFromSide && viewMode === 'topdown' && player.standingOn === null) {
                player.elevatedFromSide = false;
            }

            // 【關鍵修復】在所有碰撞檢查完成後，若處於攀附狀態，強制鎖定 Y 座標
            if (player.isClinging && viewMode === 'topdown') {
                player.y = player.clingingY;
                player.clingingX = player.x; // 同步更新鎖定的 X 位置
            }

            if (viewMode === 'sideview' && (keys['w'] || keys['W'] || keys['ArrowUp'])) {
                if (player.onGround) { player.vy = player.jumpPower; player.onGround = false; player.lastWallSide = null; }
                else if (player.touchingWallLeft && player.lastWallSide !== 'left') {
                    player.vy = player.jumpPower; player.reboundX = player.speed * 2.5; player.wallJumpTimer = 15; player.lastWallSide = 'left';
                } else if (player.touchingWallRight && player.lastWallSide !== 'right') {
                    player.vy = player.jumpPower; player.reboundX = -player.speed * 2.5; player.wallJumpTimer = 15; player.lastWallSide = 'right';
                }
            }
            if (player.onGround) player.lastWallSide = null;
        }

        // 繪製畫面
        function draw() {
            if (!ctx || !canvas) return; // 防禦性檢查
            ctx.save();
            if (shakeAmount > 0) {
                ctx.translate((Math.random() - 0.5) * shakeAmount, (Math.random() - 0.5) * shakeAmount);
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const t = isTransitioning ? transitionT : 1;

            // 分解動畫階段
            const scanPhaseEnd = 0.3;
            let scanProgress = 0;
            let flipProgress = 0;

            if (t < scanPhaseEnd) {
                scanProgress = t / scanPhaseEnd;
            } else {
                scanProgress = 1;
                const rawFlip = (t - scanPhaseEnd) / (1 - scanPhaseEnd);
                flipProgress = 1 - Math.pow(1 - rawFlip, 3); // Ease-out 效果
            }

            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for (let y = 0; y < canvas.height; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

            // 計算基準線位置 (Side-view 的切片 X 座標)
            const sliceX = ((transitionOldView === 'topdown') ? transitionStartPlayer.x : transitionEndPlayer.x) + player.width / 2;

            // 1. 繪製掃描線效果 (Phase 1)
            if (isTransitioning && t < scanPhaseEnd + 0.2) {
                ctx.save();
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 4;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffcc';
                ctx.beginPath();
                ctx.moveTo(sliceX, world.y);
                ctx.lineTo(sliceX, world.y + world.height * scanProgress);
                ctx.stroke();
                ctx.restore();
            }

            // 2. 繪製背景與翻轉效果
            if (flipProgress < 1) {
                ctx.save();
                if (isTransitioning && t >= scanPhaseEnd) {
                    ctx.globalAlpha = 1 - flipProgress;
                    const s = 1 - flipProgress * 0.2;
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.scale(s, s);
                    ctx.translate(-canvas.width / 2, -canvas.height / 2);
                }
                drawStaticScene(transitionOldView, isTransitioning ? transitionStartPlayer : player);
                ctx.restore();
            }

            // 3. 繪製翻轉中的新視角 (Phase 2)
            if (isTransitioning && t >= scanPhaseEnd) {
                ctx.save();
                const flipScale = Math.sin(flipProgress * Math.PI / 2);
                ctx.globalAlpha = flipProgress;
                ctx.translate(sliceX, 0);
                ctx.scale(flipScale, 1);
                ctx.translate(-sliceX, 0);
                drawStaticScene(viewMode, transitionEndPlayer);
                ctx.restore();
            } else if (!isTransitioning) {
                drawStaticScene(viewMode, player);
            }

            // 繪製紅色閃爍效果罩
            if (deathFlashOpacity > 0) {
                ctx.fillStyle = `rgba(255, 0, 0, ${deathFlashOpacity})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            ctx.restore();
        }

        // 抽離靜態繪圖邏輯
        function drawStaticScene(mode, pPos) {
            const gapSize = 80;
            const currentWidth = (mode === 'topdown') ? world.width : world.height;
            const currentLockedX = (mode === 'topdown') ? pPos.x : player.lockedX;

            // 【視覺效果】(此處已移除 Level 2 岩漿效果)

            // 修正：在第 8 步顯示紅色切片線，讓玩家理解側面視角的切點
            if (dialogStep === 8 && mode === 'topdown') {
                ctx.save();
                ctx.strokeStyle = '#ff3333';
                ctx.lineWidth = 4;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff0000';
                ctx.beginPath();
                let cx = pPos.x + player.width / 2;
                ctx.moveTo(cx, world.y);
                ctx.lineTo(cx, world.y + world.height);
                ctx.stroke();
                ctx.restore();
            }

            // 繪製關卡浮水印 (Level 1, 2...)
            if (currentLevel >= 1) {
                ctx.save();
                ctx.font = "bold 300px sans-serif";
                ctx.fillStyle = "rgba(0, 255, 204, 0.05)";
                ctx.textAlign = "center";
                ctx.textBaseline = "bottom";
                ctx.fillText(currentLevel, world.x + world.width / 2, world.y + world.height - 20);
                ctx.restore();
            }

            // 🔥 岩漿地板：若本關有岩漿，地面填成紅色
            if (lavaLevels.includes(currentLevel)) {
                const lavaAnim = 0.7 + 0.3 * Math.sin(Date.now() / 300); // 呼吸閃爍效果
                if (mode === 'topdown') {
                    ctx.fillStyle = `rgba(200, 30, 0, ${lavaAnim})`;
                    ctx.fillRect(world.x, world.y, world.width, world.height);
                    // 岩漿紋路
                    ctx.fillStyle = `rgba(255, 80, 0, ${lavaAnim * 0.5})`;
                    for (let i = 0; i < 6; i++) {
                        ctx.fillRect(world.x + 60 + i * 120, world.y + 40 + (i % 2) * 80, 60, 30);
                    }
                } else {
                    // 側面視角：底部地板是岩漿
                    ctx.fillStyle = `rgba(200, 30, 0, ${lavaAnim})`;
                    ctx.fillRect(world.x, world.y + world.height - 4, world.height, 4);
                }
            }

            for (const obs of obstacles) {
                let o = getVisualRectForMode(obs, mode, currentLockedX);
                if (!o || o.x === undefined) continue;
                ctx.fillStyle = obs.color || '#777';
                ctx.fillRect(o.x, o.y, o.w, o.h);
            }

            ctx.strokeStyle = world.borderColor; ctx.lineWidth = world.borderWidth;
            ctx.beginPath();
            if (mode === 'topdown') {
                ctx.moveTo(world.x, world.y + world.height);
                ctx.lineTo(world.x, world.y);
                const gx = world.x + world.width / 2 - gapSize / 2;
                ctx.lineTo(gx, world.y); ctx.moveTo(gx + gapSize, world.y);
                ctx.lineTo(world.x + world.width, world.y);
                ctx.lineTo(world.x + world.width, world.y + world.height);
                ctx.lineTo(world.x, world.y + world.height);
            } else {
                ctx.moveTo(world.x, world.y);
                ctx.lineTo(world.x, world.y + world.height);
                ctx.lineTo(world.x + world.height, world.y + world.height);
                const gy = world.y + (world.height - gapSize) / 2;
                ctx.lineTo(world.x + world.height, gy + gapSize); ctx.moveTo(world.x + world.height, gy);
                ctx.lineTo(world.x + world.height, world.y);
                ctx.lineTo(world.x, world.y);
            }
            ctx.stroke();

            ctx.fillStyle = "#ffff00"; ctx.shadowBlur = 20; ctx.shadowColor = "#ffff00";
            if (mode === 'topdown') ctx.fillRect(world.x + world.width / 2 - gapSize / 2, world.y - 8, gapSize, 8);
            else ctx.fillRect(world.x + world.height, world.y + (world.height - gapSize) / 2, 8, gapSize);

            ctx.fillStyle = pPos.color || player.color;
            ctx.shadowBlur = player.elevatedFromSide ? 30 : 15;

            if ((player.isClinging || player.elevatedFromSide) && mode === 'topdown') {
                ctx.save();
                ctx.shadowBlur = 0; ctx.fillStyle = "#ffff00"; ctx.font = "bold 15px 'PMingLiU', 'MingLiU', sans-serif"; ctx.textAlign = "center";
                ctx.fillText("【已登錄高處障礙物】", pPos.x + player.width / 2, pPos.y - 10);
                ctx.restore();
            } else {
                ctx.shadowColor = player.elevatedFromSide ? "#ffffff" : player.color;
            }

            if (player.isDying) {
                // 繪製死亡動畫：中心旋轉並縮小
                const progress = Math.min(player.deathAnimTimer / 0.8, 1);
                const scale = 1 - progress;
                const rotation = progress * Math.PI * 4; // 旋轉兩圈

                ctx.save();
                ctx.translate(pPos.x + player.width / 2, pPos.y + player.height / 2);
                ctx.rotate(rotation);
                ctx.scale(scale, scale);
                ctx.shadowBlur = 15;
                ctx.shadowColor = player.color;
                ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
                ctx.restore();

                // 繪製死亡時的文字氣泡 (讓玩家「出聲」的視覺化)
                ctx.save();
                ctx.fillStyle = "#ff0000";
                ctx.font = "bold 20px 'PMingLiU', 'MingLiU', serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "bottom";
                ctx.fillText("【系統判定死亡！】", pPos.x + player.width / 2, pPos.y - 10);
                ctx.restore();
            } else {
                ctx.fillRect(pPos.x, pPos.y, player.width, player.height);
            }
            ctx.shadowBlur = 0;
        }

        function getVisualRectForMode(obs, mode, pLockedX) {
            if (mode === 'topdown') return { x: obs.x, y: obs.y, w: obs.baseWidth, h: obs.baseDepth };
            if (pLockedX + player.width > obs.x && pLockedX < obs.x + obs.baseWidth) {
                return {
                    x: world.x + world.height - (obs.y - world.y) - obs.baseDepth,
                    y: world.y + world.height - obs.baseHeight,
                    w: obs.baseDepth,
                    h: obs.baseHeight
                };
            }
            return null;
        }

        function gameLoop(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const dt = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;
            update(dt || 0.016);
            draw();
            requestAnimationFrame(gameLoop);
        }
        // 修正：必須呼叫此行才能啟動遊戲
        requestAnimationFrame(gameLoop);
    </script>

</body>
